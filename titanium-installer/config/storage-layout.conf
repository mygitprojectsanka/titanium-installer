# titanium-installer/config/storage-layout.conf
# Storage layout and mapping configuration

# ZFS Pool: titanium
# ├── media          -> /mnt/media         (Jellyfin, *arr stack, TubeArchivist)
# ├── documents      -> /mnt/documents     (Paperless, Stirling-PDF, FileBrowser)
# ├── downloads      -> /mnt/downloads     (qBittorrent, *arr import)
# ├── photos         -> /mnt/photos        (Immich)
# ├── ai-models      -> /mnt/ai-models     (Ollama, OpenWebUI, ComfyUI)
# ├── backups        -> /mnt/backups       (PBS, Samba, service backups)
# ├── archive        -> /mnt/archive       (ArchiveBox, TubeArchivist archive)
# ├── airdrop        -> /mnt/airdrop       (Pairdrop, Samba temp share)
# ├── appdata        -> /mnt/appdata       (Docker volumes, application configs)
# └── databases      -> /mnt/databases     (PostgreSQL, MySQL, Redis data)

# Dataset -> Service Mapping
declare -A STORAGE_MAPPINGS
STORAGE_MAPPINGS=(
    # Media Services
    ["jellyfin"]="media"
    ["sonarr"]="media,downloads"
    ["radarr"]="media,downloads"
    ["prowlarr"]="appdata"
    ["tdarr"]="media"
    ["tubearchivist"]="media,archive"

    # Document Services
    ["paperless"]="documents"
    ["stirling-pdf"]="documents"
    ["filebrowser"]="documents"

    # Download Services
    ["qbittorrent"]="downloads"
    ["metube"]="downloads"

    # Photo Services
    ["immich"]="photos"

    # AI Services
    ["ollama"]="ai-models"
    ["openwebui"]="ai-models"
    ["comfyui"]="ai-models"

    # Backup Services
    ["pbs"]="backups"

    # Archive Services
    ["archivebox"]="archive"
    ["pairdrop"]="airdrop"
)

# Mount options per dataset type
declare -A MOUNT_OPTIONS
MOUNT_OPTIONS=(
    ["media"]="noatime"
    ["documents"]="noatime"
    ["downloads"]="noatime,exec"
    ["photos"]="noatime"
    ["ai-models"]="noatime"
    ["backups"]="noatime"
    ["archive"]="noatime"
    ["airdrop"]="noatime"
    ["appdata"]="noatime"
    ["databases"]="noatime,primarycache=metadata"
)
